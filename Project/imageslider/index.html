<!DOCTYPE html>
<html lang="en">
<head>

    <title>Image Slider</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="slider">
    <h1>Image Slider</h1>

    <div class="image-container">

        <img id="sliderImage" src="Java script/Project/imageslider/image.1.webp" alt="Slider Image">

</div>

<script src="index.js"></script>
